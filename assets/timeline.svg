<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tech journey timeline">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="1198" height="298" rx="20" ry="20" fill="#FFFDF8" stroke="#F0EAD9" stroke-width="1"/>

  <text x="600" y="48" text-anchor="middle" font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">
    🚀 My Dev Journey
  </text>

  <!-- base line -->
  <line x1="90" y1="170" x2="1110" y2="170" stroke="#E9E4D8" stroke-width="4" stroke-linecap="round"/>

  <!-- animated progress line -->
  <line x1="90" y1="170" x2="1110" y2="170" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="1020" stroke-dashoffset="1020">
    <animate attributeName="stroke-dashoffset" from="1020" to="0" dur="2.2s" begin="0.15s" fill="freeze"/>
  </line>

  <!-- Node 1: Foundations -->
  <g>
    <circle cx="90" cy="170" r="15" fill="#F59E0B" stroke="#FFFDF8" stroke-width="4" transform="scale(0)" transform-origin="90 170">
      <animateTransform attributeName="transform" type="scale" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze" additive="sum"/>
    </circle>
    <text x="90" y="176" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" opacity="0">1
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
    </text>
    <text x="90" y="128" text-anchor="middle" font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-size="15" font-weight="700" fill="#1F2937" opacity="0">Foundations
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
    </text>
    <text x="90" y="148" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#6B7280" opacity="0">Java · Kotlin
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
    </text>
  </g>

  <!-- Node 2: Mobile -->
  <g>
    <circle cx="345" cy="170" r="15" fill="#82AB46" stroke="#FFFDF8" stroke-width="4" transform="scale(0)" transform-origin="345 170">
      <animateTransform attributeName="transform" type="scale" from="0" to="1" dur="0.4s" begin="0.65s" fill="freeze" additive="sum"/>
    </circle>
    <text x="345" y="176" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" opacity="0">2
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.85s" fill="freeze"/>
    </text>
    <text x="345" y="212" text-anchor="middle" font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-size="15" font-weight="700" fill="#1F2937" opacity="0">Mobile Dev
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.85s" fill="freeze"/>
    </text>
    <text x="345" y="232" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#6B7280" opacity="0">Android · Flutter
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.85s" fill="freeze"/>
    </text>
  </g>

  <!-- Node 3: Full-Stack Web -->
  <g>
    <circle cx="600" cy="170" r="15" fill="#10B981" stroke="#FFFDF8" stroke-width="4" transform="scale(0)" transform-origin="600 170">
      <animateTransform attributeName="transform" type="scale" from="0" to="1" dur="0.4s" begin="1s" fill="freeze" additive="sum"/>
    </circle>
    <text x="600" y="176" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" opacity="0">3
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.2s" fill="freeze"/>
    </text>
    <text x="600" y="128" text-anchor="middle" font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-size="15" font-weight="700" fill="#1F2937" opacity="0">Full-Stack Web
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
    </text>
    <text x="600" y="148" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#6B7280" opacity="0">React · Node.js
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
    </text>
  </g>

  <!-- Node 4: Open Source -->
  <g>
    <circle cx="855" cy="170" r="15" fill="#0FAFB5" stroke="#FFFDF8" stroke-width="4" transform="scale(0)" transform-origin="855 170">
      <animateTransform attributeName="transform" type="scale" from="0" to="1" dur="0.4s" begin="1.35s" fill="freeze" additive="sum"/>
    </circle>
    <text x="855" y="176" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" opacity="0">4
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.55s" fill="freeze"/>
    </text>
    <text x="855" y="212" text-anchor="middle" font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-size="15" font-weight="700" fill="#1F2937" opacity="0">Open Source
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.55s" fill="freeze"/>
    </text>
    <text x="855" y="232" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#6B7280" opacity="0">GSSoC · NSOC · SSOC · ELUSOC
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.55s" fill="freeze"/>
    </text>
  </g>

  <!-- Node 5: Capstone -->
  <g>
    <circle cx="1110" cy="170" r="17" fill="#0EA5E9" stroke="#FFFDF8" stroke-width="4" transform="scale(0)" transform-origin="1110 170">
      <animateTransform attributeName="transform" type="scale" from="0" to="1" dur="0.45s" begin="1.7s" fill="freeze" additive="sum"/>
    </circle>
    <text x="1110" y="176" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" opacity="0">5
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.95s" fill="freeze"/>
    </text>
    <text x="1110" y="128" text-anchor="middle" font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-size="15" font-weight="700" fill="#1F2937" opacity="0">Capstone
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.95s" fill="freeze"/>
    </text>
    <text x="1110" y="148" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="12" fill="#6B7280" opacity="0">Building Nexora
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.95s" fill="freeze"/>
    </text>
  </g>
</svg>
